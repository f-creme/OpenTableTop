services:
  database:
    image: postgres:16-alpine
    container_name: opentabletop_database
    volumes:
      - postgresql_data:/var/lib/postgresql/data/
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ./database/.env
    ports:
      - "5432:5432"
    networks: 
      - postgres

networks:
  postgres:
volumes:
  postgresql_data: