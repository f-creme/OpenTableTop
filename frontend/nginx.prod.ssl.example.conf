# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name your.domain.com; # <---------- Replace with your domain
    return 301 https://$host$request_uri;
}

# HTTPS + SPA + API + WebSocket
server {
    listen 443 ssl;
    server_name your.domain.com; # <---------- Replace with your domain

    ssl_certificate /etc/certs/your.domain.com/fullchain.pem; # <---------- Replace with the location of your ssl certificate
    ssl_certificate_key /etc/certs/your.domain.com/privkey.pem; # <---------- Replace with the location of your ssl certificate

    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA
    location / {
        try_files $uri /index.html;
    }

    # Backend REST + WebSocket proxy
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}